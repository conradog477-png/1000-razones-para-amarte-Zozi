<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1000 Razones para Amarte</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ffafbd;
            --deep-red: #ff385c;
            --soft-white: #fff0f3;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(to bottom, var(--primary-pink), #ffc3a0);
            color: #4a4a4a;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 50px 20px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 50px;
        }

        .reason-card {
            border-left: 5px solid var(--deep-red);
            padding: 15px;
            margin: 10px 0;
            background: white;
            border-radius: 0 10px 10px 0;
            transition: transform 0.2s;
        }

        .reason-card:hover {
            transform: scale(1.02);
        }

        .number {
            font-weight: bold;
            color: var(--deep-red);
            margin-right: 10px;
        }

        .heart {
            color: var(--deep-red);
            font-size: 1.5rem;
            animation: heartbeat 1.2s infinite;
            display: inline-block;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #search {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid var(--primary-pink);
            border-radius: 25px;
            outline: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>1000 Razones para Amarte <span class="heart">❤</span></h1>
        <p>Un pequeño espacio dedicado a todo lo que eres.</p>
    </header>

    <div class="container">
        <input type="text" id="search" placeholder="Busca una razón (ej: sonrisa, apoyo, ojos)...">
        <div id="reasons-list">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
